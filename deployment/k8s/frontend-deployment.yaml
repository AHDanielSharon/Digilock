apiVersion: apps/v1
kind: Deployment
metadata:
  name: digilock-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: digilock-frontend
  template:
    metadata:
      labels:
        app: digilock-frontend
    spec:
      containers:
        - name: web
          image: digilock/frontend:1.0.0
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: digilock-frontend
spec:
  type: LoadBalancer
  selector:
    app: digilock-frontend
  ports:
    - port: 80
      targetPort: 3000
